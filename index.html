<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grandma's Story Time</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
</head>
<body>
  <div class="landing">
    <h1>Grandma's Story Time</h1>
    <p class="subtitle">Who's reading today?</p>
    <div class="character-picker">
      <button class="character-btn" id="btn-eli">
        <div class="character-avatar" id="avatar-eli"></div>
        <span class="character-name">Eli</span>
      </button>
      <button class="character-btn" id="btn-grandma">
        <div class="character-avatar" id="avatar-grandma"></div>
        <span class="character-name">Grandma</span>
      </button>
    </div>
  </div>
  <script type="module" src="/src/app.ts"></script>
</body>
</html>
